<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte Pollution Lumineuse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
html, body { height: 100%; margin: 0; }
#map { height: 100vh; width: 100%; }
#legend {
  position: absolute;
  bottom: 10px;
  left: 10px;
  background: rgba(255,255,255,0.9);
  padding: 5px;
  font-family: sans-serif;
  font-size: 12px;
  border-radius: 4px;
  z-index: 1000;
}
</style>
</head>
<body>

<div id="map"></div>
<div id="legend">
  <strong>Légende Bortle</strong><br>
  1 - Excellent ciel<br>
  2 - Très bon ciel<br>
  3 - Bon ciel<br>
  4 - Suburbain clair<br>
  5 - Suburbain<br>
  6 - Suburbain lumineux<br>
  7 - Ville de taille moyenne<br>
  8 - Grande ville<br>
  9 - Centre ville
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// Centre initial sur la France
const initialLat = 46.6;
const initialLon = 2.5;
const initialZoom = 6;

// Création de la carte
const map = L.map('map', { minZoom: 2, maxZoom: 12 }).setView([initialLat, initialLon], initialZoom);

// Tuiles pollution lumineuse (compatible CORS)
const lpTile = L.tileLayer('https://cartes.lightpollutionmap.info/tiles/{z}/{x}/{y}.png', {
  attribution: '&copy; Light Pollution Map',
  opacity: 0.6
}).addTo(map);

// Marker draggable
const marker = L.marker([initialLat, initialLon], { draggable: true }).addTo(map);

// Fonction pour envoyer les coordonnées à FlutterFlow
function updateCoords(lat, lng) {
  if (window.flutter_inappwebview) {
    window.flutter_inappwebview.callHandler('mapClicked', { markerPos: { lat, lng } });
  }
  console.log(`Lat: ${lat}, Lng: ${lng}`);
}

// Détecte le clic sur la carte
map.on('click', function(e) {
  marker.setLatLng(e.latlng);
  updateCoords(e.latlng.lat, e.latlng.lng);
});

// Détecte le drag du marker
marker.on('dragend', function(e) {
  const pos = marker.getLatLng();
  updateCoords(pos.lat, pos.lng);
});
</script>

</body>
</html>
